name: monthly-audit
on:
  workflow_dispatch:
  schedule:
    - cron: "0 15 1 * *"
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build:all
      - run: npm run validate:all
