name: indexnow-submit
on:
  workflow_dispatch:
  schedule:
    - cron: "30 14 * * *"
jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/seo/submit_indexnow.js
